<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 — 无船承运人批量发邮件</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; display: flex; align-items: center; min-height: 100vh; }
    .login-card { width: 380px; margin: auto; }
    .login-header { background: #1a3c6e; color: #fff; padding: 1.5rem; border-radius: .5rem .5rem 0 0; text-align: center; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <h5 class="mb-0">📧 无船承运人批量发邮件</h5>
    <small class="opacity-75">航交所内部系统</small>
  </div>
  <div class="card border-0 shadow-sm" style="border-radius: 0 0 .5rem .5rem;">
    <div class="card-body p-4">
      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label">用户名</label>
          <input name="username" class="form-control" autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">密码</label>
          <input name="password" type="password" class="form-control">
        </div>
        <button class="btn w-100" style="background:#1a3c6e;color:#fff;">登录</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
