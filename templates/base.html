<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}无船承运人邮件发送{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  {% block head %}{% endblock %}
  <style>
    body { background: #f5f7fa; }
    .navbar { background: #1a3c6e !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #aed6f1 !important; }
    .card { border: none; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .badge-sending { background: #fd7e14; }
    .badge-done    { background: #198754; }
  </style>
</head>
<body>
{% if session.logged_in %}
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <span class="navbar-brand fw-bold">无船承运人邮件发送</span>
    <div class="ms-auto d-flex gap-3">
      <a class="nav-link" href="{{ url_for('compose') }}">发送邮件</a>
      <a class="nav-link" href="{{ url_for('history') }}">历史记录</a>
      <a class="nav-link" href="{{ url_for('logout') }}">退出</a>
    </div>
  </div>
</nav>
{% endif %}
<div class="container pb-5">
  {% with msgs = get_flashed_messages() %}
    {% if msgs %}
      {% for m in msgs %}
        <div class="alert alert-warning">{{ m }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
